services:
  ollama:
    image: ollama/ollama:0.21.2
    restart: unless-stopped
    volumes:
      - ollama_storage:/root/.ollama

  init-ollama:
    image: ollama/ollama:0.21.2
    depends_on:
      - ollama
    volumes:
      - ollama_storage:/root/.ollama
    entrypoint: /bin/sh
    environment:
      - OLLAMA_HOST=ollama:11434
    command:
      - "-c"
      - "sleep 30; ollama pull llama3.2:3b"

volumes:
  ollama_storage:
