services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    container_name: otel-collector
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./config.yaml:/etc/otelcol/config.yaml
    env_file:
      - .env
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
